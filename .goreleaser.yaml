version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    flags:
      - -mod=vendor
    ldflags:
      - -X github.com/cliwright/whoiam/cmd.version={{.Version}}
    binary: whoiam

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: whoiam
    homepage: https://github.com/cliwright/whoiam
    description: "Verify you're on the right AWS account before running any command"
    repository:
      owner: cliwright
      name: homebrew-cliwright
    commit_author:
      name: Jesse Maitland
      email: jesse@cliwright.com

checksum:
  name_template: 'checksums.txt'